<script
  data-cfasync="false"
  src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"
></script>
<script>
  /* THEME */
  function toggleTheme() {
    var h = document.documentElement;
    var n = h.getAttribute("data-theme") === "dark" ? "light" : "dark";
    h.setAttribute("data-theme", n);
    try {
      localStorage.setItem("pt", n);
    } catch (e) {}
  }
  try {
    var s = localStorage.getItem("pt");
    if (s) document.documentElement.setAttribute("data-theme", s);
  } catch (e) {}

  /* SCROLL REVEAL */
  var obs = new IntersectionObserver(
    function (es) {
      es.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.add("visible");
          obs.unobserve(e.target);
        }
      });
    },
    { threshold: 0.08 },
  );
  document.querySelectorAll(".reveal").forEach(function (el) {
    obs.observe(el);
  });

  /* DETECT MOBILE (phone) */
  function isMobile() {
    return window.innerWidth <= 600;
  }

  /* IMAGE PATHS */
  var projectImages = {
    0: [
      "./Images/erp/screenshot1.png",
      "./Images/erp/screenshot2.png",
      "./Images/erp/screenshot3.png",
      "./Images/erp/screenshot4.png",
      "./Images/erp/screenshot5.png",
      "./Images/erp/screenshot6.png",
      "./Images/erp/screenshot7.png",
      "./Images/erp/screenshot8.png",
      "./Images/erp/screenshot9.png",
      "./Images/erp/screenshot10.png",
      "./Images/erp/screenshot11.png",
      "./Images/erp/screenshot12.png",
    ],
    1: [
      "./Images/edt/screenshot1.png",
      "./Images/edt/screenshot2.png",
      "./Images/edt/screenshot3.png",
      "./Images/edt/screenshot4.png",
      "./Images/edt/screenshot5.png",
      "./Images/edt/screenshot6.png",
      "./Images/edt/screenshot7.png",
      "./Images/edt/screenshot8.png",
    ],
    2: [
      "./Images/danfo/screenshot1.png",
      "./Images/danfo/screenshot2.png",
      "./Images/danfo/screenshot3.png",
      "./Images/danfo/screenshot4.png",
      "./Images/danfo/screenshot5.png",
      "./Images/danfo/screenshot6.png",
    ],
    3: [
      "./Images/cgpa/screenshot1.png",
      "./Images/cgpa/screenshot2.png",
      "./Images/cgpa/screenshot3.png",
      "./Images/cgpa/screenshot4.png",
    ],
  };

  var projectTitles = {
    0: "RS-Abimbola ERP System",
    1: "EDT Bet Prediction App",
    2: "Danfo Bus Scheduling System",
    3: "CGPA Calculator",
  };

  /* GALLERY ENGINE */
  var G = {};
  var timers = {};

  function initG(id) {
    G[id] = { imgs: projectImages[id] || [], cur: 0 };
    renderG(id);
    /* Only start slideshow on desktop/tablet — NOT on mobile */
    if (G[id].imgs.length > 1 && !isMobile()) {
      startTimer(id);
    }
  }
  function startTimer(id) {
    clearInterval(timers[id]);
    timers[id] = setInterval(function () {
      next(id, true);
    }, 2000);
  }
  function resetTimer(id) {
    if (G[id] && G[id].imgs.length > 1 && !isMobile()) startTimer(id);
  }
  function renderG(id) {
    var g = G[id];
    var sl = document.getElementById("sl" + id);
    var dt = document.getElementById("dt" + id);
    var cn = document.getElementById("cn" + id);
    var va = document.getElementById("va" + id);
    var gal = document.getElementById("g" + id);
    if (!g.imgs.length) {
      gal.classList.add("no-imgs");
      dt.innerHTML = "";
      cn.style.display = "none";
      va.style.display = "none";
      return;
    }
    gal.classList.remove("no-imgs");
    if (isMobile()) {
      /* Mobile: thumbnail handles display, just show View All */
      dt.innerHTML = "";
      cn.style.display = "none";
    } else {
      /* Desktop/tablet: full slideshow */
      var html = "";
      for (var i = 0; i < g.imgs.length; i++) {
        html +=
          '<div class="gslide"><img src="' +
          g.imgs[i] +
          '" alt="Screenshot ' +
          (i + 1) +
          '" loading="lazy"/></div>';
      }
      sl.innerHTML = html;
      sl.style.transform = "translateX(-" + g.cur * 100 + "%)";
      var dots = "";
      for (var j = 0; j < g.imgs.length; j++) {
        dots +=
          '<div class="gdot' +
          (j === g.cur ? " on" : "") +
          '" onclick="goTo(' +
          id +
          "," +
          j +
          ')"></div>';
      }
      dt.innerHTML = dots;
      cn.textContent = g.cur + 1 + " / " + g.imgs.length;
      cn.style.display = g.imgs.length > 1 ? "block" : "none";
    }
    va.style.display = "block";
  }
  function goTo(id, i) {
    if (isMobile()) return;
    var g = G[id];
    g.cur = Math.max(0, Math.min(i, g.imgs.length - 1));
    document.getElementById("sl" + id).style.transform =
      "translateX(-" + g.cur * 100 + "%)";
    document
      .getElementById("dt" + id)
      .querySelectorAll(".gdot")
      .forEach(function (d, j) {
        d.classList.toggle("on", j === g.cur);
      });
    document.getElementById("cn" + id).textContent =
      g.cur + 1 + " / " + g.imgs.length;
    resetTimer(id);
  }
  function next(id, auto) {
    if (isMobile()) return;
    var g = G[id];
    if (!g || !g.imgs.length) return;
    g.cur = (g.cur + 1) % g.imgs.length;
    document.getElementById("sl" + id).style.transform =
      "translateX(-" + g.cur * 100 + "%)";
    document
      .getElementById("dt" + id)
      .querySelectorAll(".gdot")
      .forEach(function (d, j) {
        d.classList.toggle("on", j === g.cur);
      });
    document.getElementById("cn" + id).textContent =
      g.cur + 1 + " / " + g.imgs.length;
    if (!auto) resetTimer(id);
  }
  function prev(id) {
    if (isMobile()) return;
    var g = G[id];
    if (!g || !g.imgs.length) return;
    g.cur = (g.cur - 1 + g.imgs.length) % g.imgs.length;
    document.getElementById("sl" + id).style.transform =
      "translateX(-" + g.cur * 100 + "%)";
    document
      .getElementById("dt" + id)
      .querySelectorAll(".gdot")
      .forEach(function (d, j) {
        d.classList.toggle("on", j === g.cur);
      });
    document.getElementById("cn" + id).textContent =
      g.cur + 1 + " / " + g.imgs.length;
    resetTimer(id);
  }
  [0, 1, 2, 3].forEach(function (i) {
    initG(i);
  });

  /* Re-init on resize so switching orientation works correctly */
  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      [0, 1, 2, 3].forEach(function (i) {
        clearInterval(timers[i]);
        if (G[i]) G[i].cur = 0;
        renderG(i);
        if (G[i] && G[i].imgs.length > 1 && !isMobile()) startTimer(i);
      });
    }, 200);
  });

  /* LIGHTBOX */
  var lbCurrentProject = null;
  var lbZoomIndex = 0;

  function openLightbox(id) {
    lbCurrentProject = id;
    var imgs = projectImages[id] || [];
    var strip = document.getElementById("lb-strip");
    document.getElementById("lb-title").innerHTML =
      "Screenshots &mdash; <span>" + projectTitles[id] + "</span>";
    var html = "";
    for (var i = 0; i < imgs.length; i++) {
      html +=
        '<div class="lb-strip-item" onclick="openZoom(' +
        id +
        "," +
        i +
        ')"><img src="' +
        imgs[i] +
        '" alt="Screenshot ' +
        (i + 1) +
        '" loading="lazy"/><div class="lb-strip-num">' +
        (i + 1) +
        " / " +
        imgs.length +
        "</div></div>";
    }
    strip.innerHTML = html;
    strip.scrollLeft = 0;
    document.getElementById("lightbox").classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.body.style.overflow = "";
  }
  function stripScroll(dir) {
    var strip = document.getElementById("lb-strip");
    var item = strip.querySelector(".lb-strip-item");
    var itemW = item ? item.offsetWidth : 400;
    strip.scrollBy({ left: dir * (itemW + 16), behavior: "smooth" });
  }
  function openZoom(id, index) {
    lbCurrentProject = id;
    lbZoomIndex = index;
    var imgs = projectImages[id] || [];
    document.getElementById("lb-zoom-img").src = imgs[index];
    document.getElementById("lb-zoom-counter").textContent =
      index + 1 + " / " + imgs.length;
    document.getElementById("lb-zoom").classList.add("open");
  }
  function closeZoom() {
    document.getElementById("lb-zoom").classList.remove("open");
  }
  function zoomNav(dir) {
    var imgs = projectImages[lbCurrentProject] || [];
    lbZoomIndex = (lbZoomIndex + dir + imgs.length) % imgs.length;
    document.getElementById("lb-zoom-img").src = imgs[lbZoomIndex];
    document.getElementById("lb-zoom-counter").textContent =
      lbZoomIndex + 1 + " / " + imgs.length;
  }

  document.getElementById("lightbox").addEventListener("click", function (e) {
    if (e.target === this) closeLightbox();
  });
  document.getElementById("lb-zoom").addEventListener("click", function (e) {
    if (e.target === this) closeZoom();
  });
  document.addEventListener("keydown", function (e) {
    if (document.getElementById("lb-zoom").classList.contains("open")) {
      if (e.key === "Escape") closeZoom();
      else if (e.key === "ArrowLeft") zoomNav(-1);
      else if (e.key === "ArrowRight") zoomNav(1);
    } else if (document.getElementById("lightbox").classList.contains("open")) {
      if (e.key === "Escape") closeLightbox();
      else if (e.key === "ArrowLeft") stripScroll(-1);
      else if (e.key === "ArrowRight") stripScroll(1);
    }
  });

  /* SMOOTH SCROLL FOR ANCHOR LINKS */
  document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
    anchor.addEventListener("click", function (e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute("href"));
      if (target) {
        target.scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      }
    });
  });

  /* HANDLE EMAIL PROTECTION CLICK */
  document
    .querySelectorAll('a[href^="/cdn-cgi/l/email-protection"]')
    .forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.preventDefault();
        // Decode and show email (Cloudflare's email protection)
        var encoded = this.getAttribute("href").split("#")[0];
        // Simple decode for demo - in production this would be handled by Cloudflare
        window.location.href = "mailto:taiwo.ogunkanmi@example.com";
      });
    });
</script>
